---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: avahi-daemon
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      avahi-daemon:
        type: daemonset
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: flungo/avahi
              tag: latest@sha256:45112a3642d4c10ad62219ec6c5391578bb106b201a44872fe680128d1366ae1
            env:
              REFLECTOR_ENABLE_REFLECTOR: "yes"
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi

    persistence:
      dbus:
        enabled: true
        type: hostPath
        hostPath: /run/dbus/system_bus_socket
        hostPathType: Socket
