---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.1@sha256:9b680f5dad8618e69317a005e083a00a699845fb2a72c392a558a4e2898aed20
            env:
              TZ: ${TIMEZONE}
              ALLOW_SIGNUP: "false"
              BASE_URL: https://recipes.${SECRET_DOMAIN}
              DB_ENGINE: postgres
              POSTGRES_USER:
                secretKeyRef:
                  name: mealie-db-app
                  key: user
              POSTGRES_PASSWORD:
                secretKeyRef:
                  name: mealie-db-app
                  key: password
              POSTGRES_SERVER:
                secretKeyRef:
                  name: mealie-db-app
                  key: host
              POSTGRES_PORT:
                secretKeyRef:
                  name: mealie-db-app
                  key: port
              POSTGRES_DB:
                secretKeyRef:
                  name: mealie-db-app
                  key: dbname
            envFrom:
              - secretRef:
                  name: mealie-secret
            resources:
              requests:
                cpu: 100m
                memory: 128M
              limits:
                memory: 512M
    service:
      app:
        controller: mealie
        ports:
          http:
            port: 9000
    ingress:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Services
          gethomepage.dev/icon: sh-mealie.svg
          gethomepage.dev/name: Mealie
          gethomepage.dev/widget.type: mealie
          gethomepage.dev/widget.url: "http://mealie.default.svc:9000"
          gethomepage.dev/widget.key: ${SECRET_HOMEPAGE_VAR_MEALIE_API_TOKEN}
          gethomepage.dev/widget.version: "2"
          gethomepage.dev/widget.fields: '["recipes", "users", "categories", "tags"]'
        className: external
        hosts:
          - host: "recipes.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      data:
        existingClaim: mealie
        globalMounts:
          - path: /app/data
