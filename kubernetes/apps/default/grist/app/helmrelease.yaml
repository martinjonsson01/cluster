---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grist
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      grist:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          server:
            image:
              repository: docker.io/gristlabs/grist
              tag: 1.7.16@sha256:d93db4640aeef1b2c3a1375b315798e72c591c98587a0a68c67286162a39a8ff
            envFrom:
              - secretRef:
                  name: grist-secret
            env:
              APP_HOME_URL: https://sheets.${SECRET_DOMAIN}
              GRIST_ALLOWED_HOSTS: &domain sheets.${SECRET_DOMAIN}
              GRIST_DOMAIN: *domain
              GRIST_SINGLE_ORG: sheets
              GRIST_HIDE_UI_ELEMENTS: billing
              GRIST_LIST_PUBLIC_SITES: false
              GRIST_ORG_IN_PATH: false
              GRIST_PAGE_TITLE_SUFFIX: _blank
              GRIST_FORCE_LOGIN: true
              GRIST_SUPPORT_ANON: false
              GRIST_THROTTLE_CPU: true
              GRIST_SANDBOX_FLAVOR: gvisor
              PYTHON_VERSION: 3
              PYTHON_VERSION_ON_CREATION: 3
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                memory: 750Mi

    service:
      app:
        controller: grist
        ports:
          http:
            port: 8484

    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: sh-grist.svg
          gethomepage.dev/name: Grist
        hostnames:
          - *domain
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https

    persistence:
      data:
        existingClaim: grist
        globalMounts:
          - path: /persist
