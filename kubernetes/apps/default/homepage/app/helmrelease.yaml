---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  interval: 30m
  chart:
    spec:
      chart: homepage
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: jameswynn-charts
        namespace: flux-system
      interval: 30m
  values:
    image:
      repository: ghcr.io/gethomepage/homepage
      tag: v1.13.2

    # Enable RBAC. RBAC is necessary to use Kubernetes integration
    enableRbac: true

    extraClusterRoles:
      # Discovery of Gateway API HTTPRoutes
      - apiGroups:
          - gateway.networking.k8s.io
        resources:
          - httproutes
          - gateways
        verbs:
          - get
          - list
          - watch

    serviceAccount:
      # Specify a different service account name. When blank it will default to the release
      # name if *create* is enabled, otherwise it will refer to the default service account.
      name: ""
      # Create service account. Needed when RBAC is enabled.
      create: true

    service:
      main:
        ports:
          http:
            port: 3000

    controller:
      annotations:
        reloader.stakater.com/auto: "true"
      strategy: RollingUpdate
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%

    # Exposed via a standalone HTTPRoute instead (see httproute.yaml).
    ingress:
      main:
        enabled: false

    # All the config files for Homepage can be specified under their relevant config block.
    config:
      bookmarks:
        - Developer:
            - Github:
                - abbr: GH
                  href: https://github.com/martinjonsson01/
            - Renovate Dashboard:
                - abbr: 🤖
                  href: https://github.com/martinjonsson01/cluster/issues/2
        - Social Media:
            - Reddit:
                - abbr: R
                  href: https://old.reddit.com/
            - Twitter:
                - abbr: TW
                  href: https://x.com/home
            - Hacker News:
                - abbr: HN
                  href: https://news.ycombinator.com/
        - Entertainment:
            - Youtube:
                - abbr: YT
                  href: https://www.youtube.com/

      services:

      widgets:
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "cluster"
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true
        - longhorn:
            expanded: true
            total: true
            labels: true
            nodes: true
      kubernetes:
        # change mode to 'cluster' to use RBAC service account
        mode: cluster
        ingress: true
        gateway: true
      docker:
      settings:
        title: Services
        headerStyle: boxedWidgets
        cardBlur: sm
        hideVersion: true
        disableCollapse: false

        layout:
          - Home Automation:
          - Services:
          - Media:
          - Household:
          - Observability:
          - Tools:
          - Downloads:
          - Social:

        providers:
          longhorn:
            url: http://longhorn-frontend.storage.svc:80

    # -- Main environment variables. Template enabled.
    # Syntax options:
    # A) TZ: UTC
    # B) PASSWD: '{{ .Release.Name }}'
    # C) PASSWD:
    #      configMapKeyRef:
    #        name: config-map-name
    #        key: key-name
    # D) PASSWD:
    #      valueFrom:
    #        secretKeyRef:
    #          name: secret-name
    #          key: key-name
    #      ...
    # E) - name: TZ
    #      value: UTC
    # F) - name: TZ
    #      value: '{{ .Release.Name }}'
    env:
      TZ: ${TIMEZONE}
      HOMEPAGE_ALLOWED_HOSTS: "start.${SECRET_DOMAIN}"

    persistence:
      logs:
        enabled: true
        type: emptyDir
        mountPath: /app/config/logs

    resources:
      requests:
        memory: 10Mi
        cpu: 10m
      limits:
        memory: 300Mi
        cpu: 500m
