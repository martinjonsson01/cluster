---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      forgejo-runner:
        type: deployment
        strategy: Recreate
        replicas: 1

        initContainers:
          register:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: 12.13.0
            workingDir: /data
            command:
              - forgejo-runner
              - --config
              - /etc/forgejo-runner/config.yml
              - create-runner-file
              - --instance
              - https://git.${SECRET_DOMAIN}
              - --secret
              - $(RUNNER_SECRET)
            env:
              RUNNER_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: forgejo-runner
                    key: RUNNER_SECRET

        containers:
          runner:
            image:
              repository: code.forgejo.org/forgejo/runner
              tag: 12.13.0
            workingDir: /data
            command:
              - forgejo-runner
              - daemon
              - --config
              - /etc/forgejo-runner/config.yml
            env:
              DOCKER_HOST: tcp://127.0.0.1:2375
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 2Gi

          dind:
            image:
              repository: docker
              tag: 29-dind
            env:
              DOCKER_TLS_CERTDIR: ""
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    configMaps:
      config:
        forceRename: forgejo-runner-config
        data:
          config.yml: |
            log:
              level: info
            runner:
              file: /data/.runner
              capacity: 1
              timeout: 3h
              labels:
                - "docker:docker://data.forgejo.org/oci/node:22-bookworm"
                - "ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-22.04"
                - "nix:docker://nixos/nix:latest"
            cache:
              enabled: true
            container:
              docker_host: tcp://127.0.0.1:2375

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data
      docker-lib:
        type: emptyDir
        sizeLimit: 8Gi
        advancedMounts:
          forgejo-runner:
            dind:
              - path: /var/lib/docker
      config:
        type: configMap
        name: forgejo-runner-config
        advancedMounts:
          forgejo-runner:
            register:
              - path: /etc/forgejo-runner/config.yml
                subPath: config.yml
                readOnly: true
            runner:
              - path: /etc/forgejo-runner/config.yml
                subPath: config.yml
                readOnly: true
