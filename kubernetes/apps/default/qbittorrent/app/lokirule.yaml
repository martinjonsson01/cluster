---
groups:
  - name: qbittorrent
    rules:
      - alert: QbittorrentFastResumeRejected
        expr: |
          sum by (app) (count_over_time({app="qbittorrent"} |~ "(?i)fast resume rejected"[15m])) > 10
        for: 5m
        labels:
          severity: warning
          category: logs
        annotations:
          summary: >-
            {{ $labels.app }} had {{ $value }} "fast resume rejected" errors in
            15m - the media storage may be inaccessible (this is well past the
            handful of benign rechecks a normal restart causes).
