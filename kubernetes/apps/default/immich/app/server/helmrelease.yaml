---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: 0.10.3
      sourceRef:
        kind: HelmRepository
        name: immich-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            env:
              TZ: ${TIMEZONE}
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: dbname
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: host
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: user
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: password
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-app
                    key: port

            image:
              # renovate: datasource=github-releases depName=immich-app/immich
              tag: v3.0.3

    valkey:
      enabled: true

    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-nfs

    # Immich components

    server:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 1500m
                  memory: 2048M
      # Exposed via a standalone HTTPRoute instead (see httproute.yaml).
      ingress:
        main:
          enabled: false

    machine-learning:
      controllers:
        main:
          strategy: Recreate
          containers:
            main:
              resources:
                requests:
                  cpu: 500m
                  memory: 4096M
      persistence:
        cache:
          type: persistentVolumeClaim
          existingClaim: immich-machine-learning-cache
