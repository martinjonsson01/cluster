---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: shinkro-plex-token
spec:
  module: shinkro_plex_token
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  interval: 5m
  scrapeTimeout: 30s
  targets:
    staticConfig:
      static:
        - http://shinkro.default.svc.cluster.local:7011/api/plex/settings/testToken
