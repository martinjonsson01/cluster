---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shinkro
spec:
  groups:
    - name: shinkro
      rules:
        - alert: ShinkroPlexTokenInvalid
          annotations:
            description: |
              shinkro's Plex token is invalid or shinkro is unreachable, so Plex scrobbles are no longer reaching MyAnimeList. Re-authenticate Plex in the shinkro web UI.
            summary: shinkro's Plex token is invalid or shinkro is unreachable.
          expr: probe_success{job="probe/default/shinkro-plex-token"} == 0
          for: 30m
          labels:
            severity: critical
        - alert: ShinkroPlexTokenProbeAbsent
          annotations:
            description: |
              The blackbox probe metric for shinkro's Plex token has disappeared, so token expiry would go unnoticed.
            summary: shinkro Plex token probe is missing.
          expr: absent(probe_success{job="probe/default/shinkro-plex-token"})
          for: 1h
          labels:
            severity: critical
