---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: vaultwarden
  annotations:
    # Satisfies the annotation-filter of external-dns-cloudflare; the unifi
    # instance has no crd source so this record is Cloudflare-only.
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
spec:
  endpoints:
    - dnsName: vault.${SECRET_DOMAIN}
      recordType: CNAME
      targets:
        - external.${SECRET_DOMAIN}
