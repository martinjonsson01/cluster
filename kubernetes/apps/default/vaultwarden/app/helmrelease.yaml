# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: "true"

        strategy: Recreate

        containers:
          app:
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.36.0-alpine@sha256:d3531610b486905943706b235e97159331801c6856e1367a93a5905e2b40f204

            env:
              TZ: ${TIMEZONE}
              DOMAIN: https://vault.${SECRET_DOMAIN}
              IP_HEADER: "CF-Connecting-IP"
              SIGNUPS_ALLOWED: "false"
              INVITATIONS_ALLOWED: "false"
              ROCKET_PORT: "8080"
              DATABASE_URL:
                secretKeyRef:
                  name: vaultwarden-db-app
                  key: uri
              LOGIN_RATELIMIT_MAX_BURST: "2"
              PUSH_ENABLED: "true"
              ORG_ATTACHMENT_LIMIT: "1000000" # 1GB
              USER_ATTACHMENT_LIMIT: "1000000" # 1GB
              USER_SEND_LIMIT: "1000000" # 1GB
            envFrom:
              - secretRef:
                  name: vaultwarden-secret

            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true

            securityContext:
              readOnlyRootFilesystem: true
        pod:
          priorityClassName: user-high
          securityContext:
            fsGroup: 65534
            runAsGroup: 65534
            runAsUser: 65534

    service:
      vaultwarden:
        controller: vaultwarden
        ports:
          http:
            port: 8080

    persistence:
      data:
        existingClaim: vaultwarden-data

    route:
      # LAN clients resolve vault to envoy-internal (UDM record from this route)
      # and get the full app including /admin.
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Services
          gethomepage.dev/icon: sh-vaultwarden.svg
          gethomepage.dev/name: Vaultwarden
        hostnames:
          - &host vault.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs: &backend
              - identifier: vaultwarden
                port: http
      # Internet clients come in via the Cloudflare tunnel (see dnsendpoint.yaml)
      # and /admin is blocked with a 403 (see httproutefilter.yaml).
      external:
        annotations:
          external-dns.alpha.kubernetes.io/controller: none
        hostnames:
          - *host
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /admin
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: gateway.envoyproxy.io
                  kind: HTTPRouteFilter
                  name: vaultwarden-admin-block
          - backendRefs: *backend
