# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    controllers:
      vaultwarden:
        annotations:
          reloader.stakater.com/auto: "true"

        strategy: Recreate

        containers:
          app:
            image:
              repository: ghcr.io/dani-garcia/vaultwarden
              tag: 1.35.7-alpine@sha256:9a54dad95452412afb959664dc5d6c3c3ca7c4131116ca7667888b0376320b03

            env:
              TZ: ${TIMEZONE}
              DOMAIN: https://vault.${SECRET_DOMAIN}
              IP_HEADER: "CF-Connecting-IP"
              SIGNUPS_ALLOWED: "false"
              INVITATIONS_ALLOWED: "false"
              ROCKET_PORT: "8080"
              DATABASE_URL:
                secretKeyRef:
                  name: vaultwarden-db-app
                  key: uri
              LOGIN_RATELIMIT_MAX_BURST: "2"
              PUSH_ENABLED: "true"
              ORG_ATTACHMENT_LIMIT: "1000000" # 1GB
              USER_ATTACHMENT_LIMIT: "1000000" # 1GB
              USER_SEND_LIMIT: "1000000" # 1GB
            envFrom:
              - secretRef:
                  name: vaultwarden-secret

            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true

            securityContext:
              readOnlyRootFilesystem: true
        pod:
          priorityClassName: user-high
          securityContext:
            fsGroup: 65534
            runAsGroup: 65534
            runAsUser: 65534

    service:
      vaultwarden:
        controller: vaultwarden
        ports:
          http:
            port: 8080

    persistence:
      data:
        existingClaim: vaultwarden-data

    ingress:
      vaultwarden:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Services
          gethomepage.dev/icon: sh-vaultwarden.svg
          gethomepage.dev/name: Vaultwarden
        className: external
        hosts:
          - host: &host vault.${SECRET_DOMAIN}
            paths:
              - path: /
                service: &svc
                  identifier: vaultwarden
                  port: http
      admin:
        enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        className: internal
        hosts:
          - host: *host
            paths:
              - path: /admin
                service: *svc
