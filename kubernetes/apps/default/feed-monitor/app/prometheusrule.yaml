---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: feed-monitor
spec:
  groups:
    - name: FeedMonitor
      rules:
        - alert: FeedMonitorJobFailed
          annotations:
            description: A feed-monitor job run has failed.
            summary: feed-monitor run failed.
          expr: kube_job_status_failed{namespace="default", job_name=~"feed-monitor.*"} > 0
          for: 5m
          labels:
            severity: warning
        - alert: FeedMonitorStale
          annotations:
            description: No feed-monitor run has succeeded in the last 24 hours.
            summary: feed-monitor runs are stale.
          expr: time() - kube_cronjob_status_last_successful_time{namespace="default", cronjob="feed-monitor"} > 86400
          for: 15m
          labels:
            severity: warning
        - alert: FeedMonitorMissing
          annotations:
            description: The feed-monitor cronjob is no longer reported by kube-state-metrics.
            summary: feed-monitor cronjob is missing.
          expr: absent(kube_cronjob_status_last_successful_time{namespace="default", cronjob="feed-monitor"})
          for: 1h
          labels:
            severity: warning
        - alert: FeedMonitorSpendHigh
          annotations:
            description: feed-monitor LLM spend over the last 30 days exceeds 5 USD.
            summary: feed-monitor LLM spend is high.
          expr: increase(feedmonitor_llm_spend_usd_total[30d]) > 5
          for: 1h
          labels:
            severity: warning
