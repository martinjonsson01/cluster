---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ytdl-sub
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      ytdl-sub:
        # No reloader annotation: each run reads the secret at pod start, and
        # reloader reacting to secret edits would spawn ownerless one-off jobs
        # that bypass the concurrencyPolicy below.
        type: cronjob
        cronjob:
          schedule: "0 */6 * * *"
          timeZone: "${TIMEZONE}"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          successfulJobsHistory: 1

        pod:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }

        containers:
          app:
            image:
              repository: ghcr.io/jmbannon/ytdl-sub
              tag: 2026.06.23@sha256:abbdc71622aa5485c379de0f2ce6cfcc891fdc595c47fe68c805db5d26be89f9
            command:
              - /bin/bash
              - -c
              - |
                set -euo pipefail
                echo "Updating yt-dlp..."
                python3 -m pip install --quiet --upgrade --target /tmp/pip "yt-dlp[default]"
                export PYTHONPATH=/tmp/pip
                python3 -c 'import yt_dlp; print("yt-dlp version:", yt_dlp.version.__version__)'
                exec ytdl-sub --config /secret/config.yaml sub /secret/subscriptions.yaml
            env:
              TZ: ${TIMEZONE}
              HOME: /tmp
            resources:
              requests:
                cpu: 100m
                memory: 512M
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    persistence:
      secret-files:
        type: secret
        name: ytdl-sub-secret
        globalMounts:
          - path: /secret
      media:
        type: nfs
        server: ${SECRET_NAS_IP}
        path: /volume1/Media
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
