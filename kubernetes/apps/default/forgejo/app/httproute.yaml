---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
# Split DNS: LAN clients resolve git -> external.${SECRET_DOMAIN} -> .125 and
# hit envoy-external directly; internet clients come in via the Cloudflare
# tunnel. Forgejo requires sign-in for every page (REQUIRE_SIGNIN_VIEW).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  annotations:
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Services
    gethomepage.dev/icon: sh-forgejo.svg
    gethomepage.dev/name: Forgejo
spec:
  hostnames:
    - git.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: forgejo-http
          port: 3000
      timeouts:
        # Large clones/pushes over HTTPS can exceed the default.
        request: 300s
