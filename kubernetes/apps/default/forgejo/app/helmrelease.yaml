---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  values:
    image:
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 15.0.4-rootless
      rootless: true
    service:
      ssh:
        port: 22
    tcpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
          sectionName: ssh
    persistence:
      enabled: true
      create: false
      claimName: forgejo
    gitea:
      admin:
        existingSecret: forgejo-admin
        email: forgejo@${SECRET_DOMAIN}
      config:
        database:
          DB_TYPE: sqlite3
        cache:
          ADAPTER: memory
        session:
          PROVIDER: db
        queue:
          TYPE: level
        server:
          ROOT_URL: https://git.${SECRET_DOMAIN}
          SSH_DOMAIN: git.${SECRET_DOMAIN}
          SSH_PORT: 22
          LANDING_PAGE: login
          OFFLINE_MODE: true
        service:
          DISABLE_REGISTRATION: true
          REQUIRE_SIGNIN_VIEW: true
        repository:
          DEFAULT_PRIVATE: private
          ENABLE_PUSH_CREATE_USER: true
        mailer:
          ENABLED: false
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        actions:
          ENABLED: true
          DEFAULT_ACTIONS_URL: https://data.forgejo.org
        webhook:
          # In-cluster targets are blocked by default (ALLOWED_HOST_LIST=external)
          ALLOWED_HOST_LIST: home-assistant.default.svc.cluster.local
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 2Gi
