---
# The single-hostname endpoint routing layout from the Element Call docs:
# /livekit/jwt -> lk-jwt-service, /livekit/sfu -> LiveKit signalling websocket.
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-rtc
  annotations:
    external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
spec:
  hostnames:
    - matrix-rtc.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /livekit/jwt
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: lk-jwt-service
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /livekit/sfu
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: livekit
          port: 7880
      # Long-lived signalling websocket; 0s disables the request timeout.
      timeouts:
        request: 0s
